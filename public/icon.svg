<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#141416" />
      <stop offset="100%" stop-color="#0c0c0e" />
    </radialGradient>
    
    <!-- Neon Orange Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradient for Logo -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9233" />
      <stop offset="100%" stop-color="#F27D26" />
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" stroke="#2a2a2a" stroke-width="4" />

  <!-- Grid Accents (Subtle Developer Theme) -->
  <path d="M64 0 v512 M128 0 v512 M192 0 v512 M256 0 v512 M320 0 v512 M384 0 v512 M448 0 v512" stroke="#222" stroke-width="1" opacity="0.3" />
  <path d="M0 64 h512 M0 128 h512 M0 192 h512 M0 256 h512 M0 320 h512 M0 384 h512 M0 448 h512" stroke="#222" stroke-width="1" opacity="0.3" />

  <!-- Outer Ring Glow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#F27D26" stroke-width="1.5" opacity="0.15" filter="url(#glow)" />

  <!-- Code Bracket / Geometric Symbol -->
  <g transform="translate(128, 128)" filter="url(#glow)">
    <!-- Left Bracket < -->
    <path d="M 64 64 L 16 128 L 64 192" fill="none" stroke="url(#logo-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Right Bracket > -->
    <path d="M 192 64 L 240 128 L 192 192" fill="none" stroke="url(#logo-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Slash / -->
    <path d="M 160 48 L 96 208" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" opacity="0.9" />
  </g>

  <!-- Small Core Badge -->
  <circle cx="256" cy="256" r="12" fill="#F27D26" />
</svg>
